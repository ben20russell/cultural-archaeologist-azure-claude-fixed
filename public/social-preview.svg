	<rect width="1200" height="630" fill="url(#bg)" />

	<path d="M0 0 H700 C600 120 540 200 450 255 C360 310 240 332 0 344 Z" fill="url(#mesh)" opacity="0.85" />
	<path d="M0 0 H640 C560 106 512 172 438 223 C356 279 250 298 0 314 Z" fill="#f2ecfa" opacity="0.75" />

	<path d="M590 128 L602 118 L614 128 L604 140 Z" fill="none" stroke="url(#iconGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
	<path d="M578 146 L586 142 L594 146 L588 154 Z" fill="none" stroke="url(#iconGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />

	<text x="92" y="258" font-family="system-ui, -apple-system, Segoe UI, Avenir Next, sans-serif" font-size="102" font-weight="600" letter-spacing="-2.2" fill="#09090B">Brand</text>
	<text x="410" y="258" font-family="system-ui, -apple-system, Segoe UI, Avenir Next, sans-serif" font-size="102" font-weight="600" letter-spacing="-2.2" fill="url(#brandGradient)">Archeologist</text>

	<rect width="1200" height="630" filter="url(#noise)" opacity="0.58" />
