<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#f5f4fb" />
			<stop offset="1" stop-color="#ece9f8" />
		</linearGradient>
		<linearGradient id="brandGradient" x1="410" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#6366F1" />
			<stop offset="1" stop-color="#D946EF" />
		</linearGradient>
		<linearGradient id="iconGradient" x1="560" y1="120" x2="620" y2="180" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#4F46E5" />
			<stop offset="0.58" stop-color="#7C3AED" />
			<stop offset="1" stop-color="#D946EF" />
		</linearGradient>
		<pattern id="mesh" width="44" height="38" patternUnits="userSpaceOnUse">
			<path d="M0 19 L11 0 L33 0 L44 19 L33 38 L11 38 Z" fill="none" stroke="#cdb7f0" stroke-width="1.4" opacity="0.55" />
			<path d="M0 19 L44 19 M11 0 L33 38 M33 0 L11 38" fill="none" stroke="#d5c4f2" stroke-width="1.1" opacity="0.45" />
		</pattern>
		<filter id="noise" x="0" y="0" width="1200" height="630">
			<feTurbulence type="fractalNoise" baseFrequency="0.86" numOctaves="1" seed="9" result="noise" />
			<feComponentTransfer>
				<feFuncA type="table" tableValues="0 0 0.012 0.028" />
