      <polygon points="0,-208 28,-224 28,0 0,16" fill="url(#bEast)" fill-opacity="0.9"/>
      <polygon points="0,-208 -28,-224 -28,0 0,16" fill="url(#bWest)" fill-opacity="0.92"/>
    </symbol>
    <symbol id="towerHot" viewBox="-32 -260 64 292">
      <polygon points="0,-260 28,-244 0,-228 -28,-244" fill="url(#bTop)"/>
      <polygon points="0,-228 28,-244 28,0 0,16" fill="url(#bEastHot)" fill-opacity="0.92"/>
      <polygon points="0,-228 -28,-244 -28,0 0,16" fill="url(#bWestHot)" fill-opacity="0.94"/>
    </symbol>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#halo)" />

  <path d="M188 112h160" stroke="#FFFFFF" stroke-opacity="0.45" stroke-width="16" stroke-linecap="round" />
